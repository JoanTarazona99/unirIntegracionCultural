<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Integración Cultural - KubGU</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        #app {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .phrase-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .phrase-russian {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .phrase-transliteration {
            font-size: 12px;
            color: #999;
            font-style: italic;
            margin-bottom: 5px;
        }
        
        .phrase-english {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .phrase-meta {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .badge {
            background: #e3f2fd;
            color: #667eea;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .chat-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 500px;
            margin-bottom: 30px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            background: #f0f0f0;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .chat-input {
            padding: 15px;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
        }
        
        .chat-input button {
            padding: 10px 20px;
            min-width: 80px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .tab-button {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .alert {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #856404;
        }
        
        .success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .grid-phrases {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
    </style>
</head>

                        'de': 'Deutsch',
                        'pt': 'Português',
                        'ru': 'Русский',
                        'zh': '中文',
                        'ja': '日本語'
                    },
                    chatMessages: [
                        { id: 1, type: 'bot', text: '¡Hola! Soy tu asistente de integración cultural. ¿Cómo puedo ayudarte?' }
                    ],
                    chatInput: '',
                    phrasesTab: 'all',
                    favorites: new Set(),
                    phrases: [
                        {
                            id: 1,
                            russian: "Мне нужна помощь",
                            transliteration: "Mne nuzhna pomoshch'",
                            english: "I need help",
                            category: "General"
                        },
                        {
                            id: 2,
                            russian: "Где находится МФЦ?",
                            transliteration: "Gde nakhoditsya MFC?",
                            english: "Where is the MFC?",
                            category: "Documentos"
                        },
                        {
                            id: 3,
                            russian: "Говорите медленнее",
                            transliteration: "Govorite medlennee",
                            english: "Speak more slowly",
                            category: "General"
                        },
                        {
                            id: 4,
                            russian: "Спасибо",
                            transliteration: "Spasibo",
                            english: "Thank you",
                            category: "Cortesía"
                        }
                    ]
                };
            },
            computed: {
                filteredPhrases() {
                    if (this.phrasesTab === 'favorites') {
                        return this.phrases.filter(p => this.favorites.has(p.id));
                    }
                    return this.phrases;
                }
            },
            methods: {
                saveProfile() {
                    alert('Perfil guardado: ' + JSON.stringify(this.profile));
                },
                searchDocuments() {
                    this.addMessage('bot', 'Buscando: ' + this.searchQuery + '\n[Búsqueda RAG en construcción]');
                },
                async sendMessage() {
                    if (this.chatInput.trim()) {
                        const userMessage = this.chatInput;
                        this.addMessage('user', userMessage);
                        this.chatInput = '';
                        
                        try {
                            // Llamar a la API de chat con idioma seleccionado
                            const response = await fetch('/api/chat', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    query: userMessage,
                                    user_id: this.profile.user_id || 'default_user',
                                    language: this.selectedLanguage
                                })
                            });
                            
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            
                            const data = await response.json();
                            
                            // Mostrar respuesta del RAG
                            let botResponse = data.answer || 'No se pudo procesar la solicitud';
                            
                            // Agregar contexto si está disponible
                            if (data.context && data.context.length > 0) {
                                botResponse += '\n\n📚 Fuentes:\n';
                                data.context.forEach(ctx => {
                                    botResponse += '• ' + ctx + '\n';
                                });
                            }
                            
                            this.addMessage('bot', botResponse);
                        } catch (error) {
                            console.error('Error:', error);
                            this.addMessage('bot', '❌ Error al conectar con el servidor: ' + error.message);
                        }
                    }
                },
                addMessage(type, text) {
                    this.chatMessages.push({
                        id: this.chatMessages.length + 1,
                        type: type,
                        text: text
                    });
                },
                toggleFavorite(id) {
                    if (this.favorites.has(id)) {
                        this.favorites.delete(id);
                    } else {
                        this.favorites.add(id);
                    }
                },
                favoritePhrase(id) {
                    return this.favorites.has(id);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
